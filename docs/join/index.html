<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Join bingoo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f9f7fe;
        --card: #ffffff;
        --text: #24144d;
        --muted: #746a93;
        --primary: #6c3ce2;
        --primary-dark: #572ec0;
        --border: #e4ddf4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(108, 60, 226, 0.12), transparent 35%),
          var(--bg);
        color: var(--text);
        font-family:
          ui-rounded,
          "SF Pro Rounded",
          "Avenir Next",
          "Trebuchet MS",
          sans-serif;
      }

      .card {
        width: min(100%, 420px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 28px 24px;
        box-shadow: 0 18px 40px rgba(36, 20, 77, 0.08);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 8vw, 42px);
        line-height: 1;
      }

      .code {
        margin: 16px 0 10px;
        color: var(--primary);
        font-size: clamp(40px, 11vw, 56px);
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 18px;
        border: none;
        border-radius: 16px;
        background: var(--primary);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        text-decoration: none;
      }

      .button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }

      .button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">bingoo invite</p>
      <h1>Join the game</h1>
      <div class="code" id="code">------</div>
      <p id="message">
        If bingoo is installed, tapping below should open the app directly.
      </p>
      <div class="actions">
        <a class="button" id="open-link" href="/">Open in bingoo</a>
        <button class="button secondary" id="copy-code" type="button">
          Copy code
        </button>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const rawCode = (params.get('code') || '').trim().toUpperCase();
      const validCode = /^[A-Z0-9]{6}$/.test(rawCode) ? rawCode : '';
      const deepLink = validCode ? `bingoo://join/${validCode}` : 'bingoo://';

      document.getElementById('code').textContent = validCode || '------';
      document.getElementById('open-link').setAttribute('href', deepLink);
      const copyButton = document.getElementById('copy-code');

      if (!validCode) {
        document.getElementById('message').textContent =
          'This invite link is missing a valid game code. Ask your friend to share it again.';
      } else {
        copyButton.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(validCode);
            copyButton.textContent = 'Code copied';
          } catch (_) {
            copyButton.textContent = validCode;
          }
        });

        window.setTimeout(() => {
          window.location.href = deepLink;
        }, 250);
      }
    </script>
  </body>
</html>
